services:
  app:
    build: ./app
    container_name: phone_app
    restart: always
    network_mode: host
    environment:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/phone_directory

  nginx:
    image: nginx:alpine
    container_name: phone_nginx
    restart: always
    network_mode: host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
